<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarkus Blog</title>
    <link rel="stylesheet" href="style.css">
</head>

<header class="header">
    <span  class="material-symbols-outlined" alt="Hamburger Icon">menu</span>
    <h1>Welcome to Quarkus Blog!</h1>
    <div class="change_mode">

    <img src="./assets/sun_light_mode.svg" alt="Sun Icon" class="sun">

</header>

<footer class="footer">
    <div class="footer-content">
        <a href="https://pages.quarkiverse.io/quarkus-roq/" target="_blank">
        <img src="./assets/roq-icon.svg" alt="Quarkus Logo">
        </a>
        <p>@2024{$name}<br />
        Made for <a href="https://github.com/RayzaAnchayhua" title="Visite meu Github!" target="_blank">RayzaAnchayhua</a></p>
    </div>
    <div class="social-midia-footer">
        <a href="https://in.linkedin.com/in/quarkusio" target="_blank">
        <img src="./assets/linkedin-icon.svg" alt="Linkedin Logo" class="social-midia">
        </a>
        <a href="https://pages.quarkiverse.io/quarkus-roq/" target="_blank">
        <img src="./assets/github-white-icon.svg" alt="Github Logo" class="social-midia">
        </a >
        <a href="https://www.instagram.com/rayzaluana_tech/" target="_blank">
        <img src="./assets/insta-icon.svg" alt="Instagram Logo" class="social-midia">
        </a>
